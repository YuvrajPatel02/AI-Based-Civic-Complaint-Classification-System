services:
  - type: web
    name: civic-complaint-classifier
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3

      - key: SECRET_KEY
        generateValue: true

    disk:
      name: complaint-data
      mountPath: /opt/render/project/src/database
      sizeGB: 1